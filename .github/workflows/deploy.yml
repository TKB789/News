name: Deploy to GitHub Pages

on:
  # Run after the "Capture daily news" workflow finishes
  workflow_run:
    workflows: ["Capture daily news"]
    types: [completed]
  # Allow manual runs from the Actions tab
  workflow_dispatch:

# Permissions needed for the GITHUB_TOKEN to deploy to Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress run
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    # Only deploy if the upstream workflow succeeded (skipped for manual runs)
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Assemble site
        # Copy only what the site needs into a clean folder,
        # so .git and other repo files never end up in the artifact
        run: |
          mkdir -p site
          cp index.html site/
          [ -d assets ] && cp -r assets site/ || true
          [ -d data ]   && cp -r data site/   || true

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "site"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Quiet Desk — Daily Brief</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400&display=swap');
  :root{
    --paper:#f3efe6;--paper-deep:#e9e3d6;--ink:#1c1a14;--ink-soft:#46402f;
    --rule:#c4baa4;--accent:#2f4a3b;--accent-warm:#a8551f;--max:760px;color-scheme:light;
  }
  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{margin:0;background:var(--paper)!important;color:var(--ink)!important;
    font-family:'Newsreader',Georgia,serif;font-size:21px;line-height:1.52;-webkit-font-smoothing:antialiased;}
  @media (prefers-reduced-motion:reduce){html{scroll-behavior:auto;}*{animation:none!important;transition:none!important;}}
  .wrap{max-width:var(--max);margin:0 auto;padding:0 22px 90px;}
  header.mast{border-bottom:2px solid var(--ink);padding:40px 0 18px;margin-bottom:6px;}
  .eyebrow{font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:var(--ink-soft);}
  h1.title{font-family:'Fraunces',serif;font-weight:600;font-size:clamp(40px,9vw,72px);
    line-height:.96;margin:.18em 0 .12em;letter-spacing:-.01em;}
  .dateline{display:flex;justify-content:space-between;align-items:baseline;flex-wrap:wrap;gap:8px;
    font-size:14px;color:var(--ink-soft);font-style:italic;}
  .dateline .pace{font-style:normal;letter-spacing:.04em;}

  .days{display:flex;gap:7px;overflow-x:auto;padding:14px 0 4px;margin-bottom:2px;
    -webkit-overflow-scrolling:touch;scrollbar-width:thin;}
  .day{flex:0 0 auto;cursor:pointer;border:1px solid var(--rule);background:var(--paper-deep);
    border-radius:3px;padding:8px 12px;text-align:center;min-width:62px;
    font-family:'Newsreader',serif;color:var(--ink-soft);line-height:1.2;}
  .day .dow{display:block;font-size:13px;letter-spacing:.04em;text-transform:uppercase;}
  .day .dnum{display:block;font-size:18px;color:var(--ink);font-weight:500;}
  .day.sel{background:var(--accent);border-color:var(--accent);}
  .day.sel .dow,.day.sel .dnum{color:var(--paper);}
  .day.empty-day{opacity:.45;cursor:default;}
  .day .dot{display:block;width:5px;height:5px;border-radius:50%;background:var(--accent-warm);margin:3px auto 0;}
  .day.sel .dot{background:var(--paper);}

  .controls{display:flex;gap:10px;flex-wrap:wrap;align-items:center;
    padding:14px 0 6px;border-bottom:1px solid var(--rule);margin-bottom:30px;}
  .controls input[type=search]{flex:1 1 200px;min-width:160px;background:#fff;border:1px solid var(--rule);
    color:var(--ink);font-family:inherit;font-size:17px;padding:11px 13px;border-radius:2px;}
  .controls input::placeholder{color:var(--ink-soft);}
  button{font-family:'Newsreader',serif;font-size:16px;cursor:pointer;background:var(--accent);
    color:var(--paper);border:none;padding:11px 18px;border-radius:2px;letter-spacing:.02em;}
  button.ghost{background:none;color:var(--accent);border:1px solid var(--accent);}
  button.ghost[aria-pressed="true"]{background:var(--accent);color:var(--paper);}
  button:focus-visible,a:focus-visible,input:focus-visible{outline:2px solid var(--accent-warm);outline-offset:2px;}
  .status{font-size:15px;color:var(--ink-soft);font-style:italic;min-height:1.2em;padding:2px 0;}

  section.cat{margin:0 0 8px;border-top:1px solid var(--rule);}
  section.cat:first-of-type{border-top:none;}
  .cat-head{display:flex;align-items:baseline;gap:14px;padding:26px 0 6px;}
  .cat-num{font-family:'Fraunces',serif;font-size:15px;color:var(--accent);font-weight:500;font-variant-numeric:tabular-nums;}
  .cat-name{font-family:'Fraunces',serif;font-weight:600;font-size:26px;letter-spacing:-.01em;}
  .cat-look{font-size:14px;color:var(--ink-soft);font-style:italic;margin-left:auto;text-align:right;}

  article{padding:16px 0 18px;border-bottom:1px solid var(--rule);display:flex;gap:12px;align-items:flex-start;}
  article:last-child{border-bottom:none;}
  article .body{flex:1;min-width:0;}
  article h3{margin:0 0 6px;font-size:22px;font-weight:500;line-height:1.3;}
  article h3 a{color:var(--ink);text-decoration:none;background-image:linear-gradient(var(--rule),var(--rule));
    background-size:100% 1px;background-repeat:no-repeat;background-position:0 1.15em;}
  article h3 a:hover{color:var(--accent);}
  .meta{font-size:14px;color:var(--ink-soft);letter-spacing:.02em;margin-bottom:7px;}
  .meta .src{font-style:italic;}
  .blurb{font-size:18px;color:var(--ink-soft);line-height:1.5;margin:0;}
  .empty{font-size:16px;color:var(--ink-soft);font-style:italic;padding:6px 0 14px;}

  .star{flex:0 0 auto;background:none;border:none;cursor:pointer;padding:2px 4px;margin:0;
    font-size:22px;line-height:1;color:var(--rule);transition:color .15s,transform .15s;}
  .star:hover{color:var(--accent-warm);transform:scale(1.12);}
  .star.on{color:var(--accent-warm);}
  #favbtn .badge{display:inline-block;min-width:18px;margin-left:6px;padding:0 5px;border-radius:9px;
    background:var(--accent-warm);color:var(--paper);font-size:12px;line-height:18px;text-align:center;vertical-align:1px;}
  .fav-note{font-size:15px;color:var(--ink-soft);font-style:italic;padding:10px 0 20px;}

  footer{margin-top:50px;padding-top:18px;border-top:2px solid var(--ink);
    font-size:13px;color:var(--ink-soft);line-height:1.6;}
  .spin{display:inline-block;width:11px;height:11px;border:2px solid var(--rule);
    border-top-color:var(--accent);border-radius:50%;animation:sp .7s linear infinite;vertical-align:-1px;margin-right:6px;}
  @keyframes sp{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<div class="wrap">
  <header class="mast">
    <div class="eyebrow">A calm, observational daily brief</div>
    <h1 class="title">The Quiet Desk</h1>
    <div class="dateline"><span id="dateline">—</span><span class="pace" id="count"></span></div>
  </header>

  <div class="days" id="days" role="tablist" aria-label="Days"></div>

  <div class="controls">
    <input type="search" id="filter" placeholder="Filter headlines by keyword…" aria-label="Filter headlines by keyword">
    <button class="ghost" id="onlyfilter" aria-pressed="false">Hide non-matches</button>
    <button class="ghost" id="favbtn" aria-pressed="false">★ Favorites<span class="badge" id="favcount" hidden>0</span></button>
  </div>
  <div class="status" id="status"></div>

  <main id="feed"></main>

  <footer>
    A calm daily reading of the world, captured automatically each day from public RSS feeds. Each day shows only what is new since earlier days. Headlines link to their sources. Favorites are saved in this browser.
  </footer>
</div>

<script>
/* Reads pre-captured snapshots committed by the GitHub Action in /data.
   No live feed fetching, no relay — the Action does that on a schedule. */
const $ = s => document.querySelector(s);
const feedEl=$("#feed"), statusEl=$("#status");
const DATA='data/';

let INDEX=[];          // array of date keys, oldest→newest
let CACHE={};          // dateKey -> snapshot json
let SELECTED=null;

/* favorites */
const FAV_KEY='quietdesk_favs';
let FAVS={}; try{ FAVS=JSON.parse(localStorage.getItem(FAV_KEY))||{}; }catch{}
function saveFavs(){ try{ localStorage.setItem(FAV_KEY,JSON.stringify(FAVS)); }catch{} }
function favId(i){ return i.link||i.title; }
function isFav(i){ return !!FAVS[favId(i)]; }
function toggleFav(i){ const id=favId(i);
  if(FAVS[id]) delete FAVS[id];
  else FAVS[id]={title:i.title,link:i.link,blurb:i.blurb,src:i.src,cat:i.cat,saved:Date.now()};
  saveFavs(); updateFavCount(); }
function updateFavCount(){ const n=Object.keys(FAVS).length,el=$("#favcount"); el.textContent=n; el.hidden=n===0; }

function keyToDate(k){ const [y,m,d]=k.split('-').map(Number); return new Date(y,m-1,d); }
function isToday(k){ return k===new Date().toISOString().slice(0,10); }
function setDateline(d){ $("#dateline").textContent=d.toLocaleDateString(undefined,{weekday:'long',year:'numeric',month:'long',day:'numeric'}); }
function timeAgo(x){ if(!x) return ""; const d=new Date(x); if(isNaN(d)) return "";
  const m=Math.round((Date.now()-d)/60000); if(m<0)return""; if(m<60)return m<=1?"just now":m+" min ago";
  const h=Math.round(m/60); if(h<24)return h+"h ago"; return Math.round(h/24)+"d ago"; }

async function loadIndex(){
  statusEl.innerHTML='<span class="spin"></span>Loading archive…';
  try{
    const res=await fetch(DATA+'index.json',{cache:'no-store'});
    if(!res.ok) throw new Error(res.status);
    const j=await res.json();
    INDEX=(j.days||[]).slice().sort();
  }catch(e){ INDEX=[]; }
  buildTabs();
  if(INDEX.length){
    const latest=INDEX[INDEX.length-1];
    await selectDay(latest);
    statusEl.textContent=`Archive: ${INDEX.length} day${INDEX.length>1?'s':''} captured.`;
  } else {
    feedEl.innerHTML=`<p class="fav-note">No snapshots yet. Once the daily capture runs in GitHub Actions, days will appear here. You can trigger the first run manually from the repo's Actions tab → “Capture daily news” → Run workflow.</p>`;
    statusEl.textContent="";
  }
}

async function getDay(k){
  if(CACHE[k]) return CACHE[k];
  const res=await fetch(`${DATA}${k}.json`,{cache:'no-store'});
  if(!res.ok) throw new Error(res.status);
  const j=await res.json(); CACHE[k]=j; return j;
}

function buildTabs(){
  const strip=$("#days"); strip.innerHTML="";
  // show a continuous 14-day window ending today; mark which have captures
  const today=new Date(); const WINDOW=14;
  for(let n=WINDOW-1;n>=0;n--){
    const d=new Date(today.getFullYear(),today.getMonth(),today.getDate()-n);
    const k=d.toISOString().slice(0,10);
    const has=INDEX.includes(k);
    const btn=document.createElement("button");
    btn.className="day"+(has?"":" empty-day")+(k===SELECTED?" sel":"");
    btn.setAttribute("role","tab"); btn.setAttribute("aria-selected",k===SELECTED?"true":"false");
    const dow=n===0?"Today":d.toLocaleDateString(undefined,{weekday:'short'});
    btn.innerHTML=`<span class="dow">${dow}</span><span class="dnum">${d.getDate()}</span>${has?'<span class="dot"></span>':''}`;
    btn.title=has?`Captured ${d.toLocaleDateString()}`:`No capture for ${d.toLocaleDateString()}`;
    if(has) btn.addEventListener("click",()=>selectDay(k));
    strip.appendChild(btn);
  }
}

async function selectDay(k){
  SELECTED=k;
  $("#favbtn").setAttribute("aria-pressed","false");
  $("#favbtn").firstChild.textContent="★ Favorites";
  buildTabs();
  const sel=$("#days .day.sel"); if(sel) sel.scrollIntoView({inline:'center',block:'nearest'});
  setDateline(keyToDate(k));
  try{ await getDay(k); }catch{}
  render();
}

function articleNode(i,q){
  const dimNon=(q && !i.title.toLowerCase().includes(q));
  const art=document.createElement("article"); if(dimNon) art.style.opacity=".4";
  const star=document.createElement("button");
  const setStar=()=>{ const on=isFav(i); star.className="star "+(on?"on":""); star.textContent=on?"★":"☆";
    star.setAttribute("aria-pressed",String(on)); star.setAttribute("aria-label",on?"Remove from favorites":"Add to favorites"); };
  setStar();
  star.addEventListener("click",()=>{ toggleFav(i); setStar();
    if($("#favbtn").getAttribute("aria-pressed")==="true" && !isFav(i)) art.remove(); });
  const body=document.createElement("div"); body.className="body";
  body.innerHTML=`<div class="meta"><span class="src">${i.src||"source"}</span>${i.date?" · "+timeAgo(i.date):""}${i.cat?' · '+i.cat:''}</div>
    <h3><a href="${i.link}" target="_blank" rel="noopener">${i.title}</a></h3>
    ${i.blurb?`<p class="blurb">${i.blurb}</p>`:""}`;
  art.appendChild(star); art.appendChild(body); return art;
}

function renderFavorites(){
  feedEl.innerHTML="";
  const favs=Object.values(FAVS).sort((a,b)=>b.saved-a.saved);
  const sec=document.createElement("section"); sec.className="cat";
  sec.innerHTML=`<div class="cat-head"><span class="cat-num">★</span><span class="cat-name">Favorites</span><span class="cat-look">saved on this device</span></div>`;
  if(!favs.length) sec.innerHTML+=`<p class="fav-note">No favorites yet. Tap the star beside any headline to keep it here.</p>`;
  else favs.forEach(i=>sec.appendChild(articleNode(i,"")));
  feedEl.appendChild(sec);
}

function render(){
  if($("#favbtn").getAttribute("aria-pressed")==="true"){ renderFavorites(); return; }
  const q=$("#filter").value.trim().toLowerCase();
  const hideNon=$("#onlyfilter").getAttribute("aria-pressed")==="true";
  feedEl.innerHTML="";
  const day=SELECTED && CACHE[SELECTED];
  if(!day){ feedEl.innerHTML=`<p class="fav-note">Nothing captured for this day.</p>`; $("#count").textContent=""; return; }
  const total=day.cats.reduce((s,c)=>s+c.items.length,0);
  $("#count").textContent=total+" new · "+(isToday(SELECTED)?"today":keyToDate(SELECTED).toLocaleDateString());
  day.cats.forEach((block,idx)=>{
    const matches=block.items.filter(i=>!q||i.title.toLowerCase().includes(q));
    const show=hideNon?matches:block.items;
    if(hideNon && matches.length===0) return;
    const sec=document.createElement("section"); sec.className="cat";
    sec.innerHTML=`<div class="cat-head"><span class="cat-num">${String(idx+1).padStart(2,'0')}</span>
      <span class="cat-name">${block.name}</span><span class="cat-look">${block.look}</span></div>`;
    if(show.length===0) sec.innerHTML+=`<p class="empty">Nothing new in this section ${isToday(SELECTED)?"today":"that day"}.</p>`;
    show.forEach(i=>sec.appendChild(articleNode(i,q)));
    feedEl.appendChild(sec);
  });
}

$("#filter").addEventListener("input",render);
$("#onlyfilter").addEventListener("click",e=>{ const b=e.currentTarget,on=b.getAttribute("aria-pressed")==="true";
  b.setAttribute("aria-pressed",String(!on)); b.textContent=on?"Hide non-matches":"Show all again"; render(); });
$("#favbtn").addEventListener("click",e=>{ const b=e.currentTarget,on=b.getAttribute("aria-pressed")==="true";
  b.setAttribute("aria-pressed",String(!on)); b.firstChild.textContent=on?"★ Favorites":"★ Showing favorites"; render(); });

updateFavCount();
setDateline(new Date());
loadIndex();
</script>
</body>
</html>
